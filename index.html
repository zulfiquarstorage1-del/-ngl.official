<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NGL - Anonymous Messages</title>

    <link rel="icon" href="ngl.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="adModal" class="modal-overlay hidden">
    <div class="modal-content">
        <div id="gameScreen">
            <div class="game-badge">ADVERTISEMENT</div>
            <h2 class="game-title">🎮 Quest of Legends ✨</h2>
            <p class="game-desc">Loading your ultimate 2.5D browser RPG sandbox world...</p>
            <div class="game-loader">
                <div class="loading-bar"></div>
            </div>
        </div>

        <div id="registerScreen" class="hidden">
            <h3 class="reg-title">Unlock Anonymous Chat</h3>
            <p class="reg-desc">Verify via Gmail to securely drop responses.</p>
            <form id="gmailForm">
                <input 
                    type="email" 
                    id="userEmail" 
                    placeholder="yourname@gmail.com" 
                    required
                    pattern="[a-zA-Z0-9._%+-]+@gmail.com$"
                    title="Please enter a valid Gmail address"
                />
                <button type="submit" id="submitBtn" class="reg-button">Access Chatbox</button>
            </form>
        </div>
    </div>
</div>

<div class="screen-wrapper">

    <main class="card-container">

        <section class="main-input-card">

            <header class="profile-header">

                <div class="avatar">
                    <img src="ngl.png" class="chatbox-logo-img" alt="NGL">
                </div>

                <div class="profile-info">
                    <span class="username">@ngl.official</span>
                    <span class="subtext">send me anonymous messages!</span>
                </div>

            </header>

            <div class="textarea-container">

                <textarea
                    id="message-input"
                    spellcheck="false"
                    placeholder="wyd later?"
                ></textarea>

                <button
                    class="dice-btn"
                    id="dice-trigger"
                    type="button"
                    aria-label="Random Prompt">

                    <span class="dice-emoji">🎲</span>

                </button>

            </div>

        </section>

        <div class="anonymous-badge">
            <span class="lock-icon">🔒</span>
            anonymous q&amp;a
        </div>

        <div class="bottom-group">

            <div class="tap-counter">
                👇 256 friends just tapped the button 👇
            </div>

            <button class="cta-button">
                Get your own messages!
            </button>

            <div class="footer-links">
                <a href="#">Terms</a>
                <a href="#">Privacy</a>
            </div>

        </div>

    </main>

</div>

<script>
const prompts=[
"are you single?",
"do you like anyone right now?",
"do you prefer texting or facetime?",
"Are you talking to anyone??",
"how tall are you",
"do you believe in second chances?",
"wyd later?"
];

const textarea=document.getElementById("message-input");
const diceBtn=document.getElementById("dice-trigger");

let shuffleInterval;

function changePlaceholderWithFade(){
    textarea.classList.add("fade-out");
    setTimeout(()=>{
        let current=textarea.placeholder;
        let next=current;
        while(next===current){
            next=prompts[Math.floor(Math.random()*prompts.length)];
        }
        textarea.placeholder=next;
        textarea.classList.remove("fade-out");
    },250);
}

function startAutoShuffle(){
    clearInterval(shuffleInterval);
    shuffleInterval=setInterval(()=>{
        if(textarea.value===""){
            changePlaceholderWithFade();
        }
    },3000);
}

diceBtn.addEventListener("click",()=>{
    changePlaceholderWithFade();
    textarea.value="";
    textarea.focus();
    startAutoShuffle();
});

let currentCount=256;
const counter=document.querySelector(".tap-counter");

function updateCounterLoop(){
    currentCount+=Math.floor(Math.random()*2)+1;
    counter.innerHTML=`👇 ${currentCount} friends just tapped the button 👇`;
    setTimeout(updateCounterLoop, Math.floor(Math.random()*1001)+1000);
}

startAutoShuffle();
setTimeout(updateCounterLoop, Math.floor(Math.random()*1001)+1000);


/* ==========================================
   POPUP AD & SUPABASE HANDLING LOGIC
========================================== */
document.addEventListener("DOMContentLoaded", () => {
    // If user already logged in previously, stop popup entirely
    if (localStorage.getItem("ngl_registered_gmail") === "true") {
        return;
    }

    const adModal = document.getElementById("adModal");
    const gameScreen = document.getElementById("gameScreen");
    const registerScreen = document.getElementById("registerScreen");
    const gmailForm = document.getElementById("gmailForm");
    const submitBtn = document.getElementById("submitBtn");

    // 1. Popup appears after 5 seconds
    setTimeout(() => {
        adModal.classList.remove("hidden");

        // 2. Game plays for 20 seconds, then transforms to signup screen
        setTimeout(() => {
            gameScreen.classList.add("hidden");
            registerScreen.classList.remove("hidden");
        }, 20000); 

    }, 5000);

    // 3. Form Data Pipeline back to Serverless Router
    gmailForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const emailVal = document.getElementById("userEmail").value.trim();

        submitBtn.innerText = "Verifying...";
        submitBtn.disabled = true;

        try {
            const response = await fetch("/api/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email: emailVal })
            });

            const data = await response.json();

            if (response.ok) {
                // Save flag to browser cache
                localStorage.setItem("ngl_registered_gmail", "true");
                adModal.classList.add("hidden");
            } else {
                alert(data.error || "An error occurred. Please verify your email structure.");
                submitBtn.innerText = "Access Chatbox";
                submitBtn.disabled = false;
            }
        } catch (err) {
            console.error(err);
            alert("Network connection error. Try again.");
            submitBtn.innerText = "Access Chatbox";
            submitBtn.disabled = false;
        }
    });
});
</script>

</body>
</html>
